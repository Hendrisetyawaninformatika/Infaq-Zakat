<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>404 - Halaman Tidak Ditemukan - Filantropi Digital</title>

    <meta name="description" content="Halaman tidak ditemukan - Filantropi Digital" />
    <link rel="icon" href="assets/icon.ico" type="image/x-icon" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2E7D32;
            --primary-dark: #1a472a;
            --primary-light: #4CAF50;
            --gold: #FFD700;
            --gold-light: #FFE44D;
            --bg: #f8f6f0;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #666666;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --text-light: #aaaaaa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            opacity: 0;
            animation: fadeInPage 0.8s ease forwards;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           ISLAMIC BACKGROUND DECORATIONS
           ============================================ */
        .islamic-ornament {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 30px;
            color: rgba(46, 125, 50, 0.05);
            animation: ornamentFloat 12s ease-in-out infinite;
        }
        .islamic-ornament:nth-child(1) {
            top: 5%;
            left: 3%;
            animation-delay: 0s;
            font-size: 50px;
        }
        .islamic-ornament:nth-child(2) {
            top: 15%;
            right: 5%;
            animation-delay: 2s;
            font-size: 35px;
        }
        .islamic-ornament:nth-child(3) {
            bottom: 20%;
            left: 2%;
            animation-delay: 4s;
            font-size: 45px;
        }
        .islamic-ornament:nth-child(4) {
            bottom: 30%;
            right: 3%;
            animation-delay: 6s;
            font-size: 40px;
        }
        .islamic-ornament:nth-child(5) {
            top: 50%;
            left: 1%;
            animation-delay: 8s;
            font-size: 25px;
        }
        .islamic-ornament:nth-child(6) {
            top: 60%;
            right: 2%;
            animation-delay: 10s;
            font-size: 30px;
        }

        @keyframes ornamentFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translateY(-20px) rotate(5deg) scale(1.1);
                opacity: 0.6;
            }
            50% {
                transform: translateY(10px) rotate(-3deg) scale(0.9);
                opacity: 0.4;
            }
            75% {
                transform: translateY(-10px) rotate(8deg) scale(1.05);
                opacity: 0.5;
            }
        }

        .crescent-moon {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 60px;
            color: rgba(255, 215, 0, 0.04);
            animation: moonGlow 8s ease-in-out infinite;
        }
        .crescent-moon:nth-child(1) {
            top: 8%;
            right: 8%;
            animation-delay: 0s;
        }
        .crescent-moon:nth-child(2) {
            bottom: 10%;
            left: 8%;
            animation-delay: 4s;
            font-size: 40px;
        }

        @keyframes moonGlow {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.2) rotate(20deg);
                opacity: 0.6;
            }
        }

        .arabic-bg-text {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-family: 'Amiri', serif;
            color: rgba(46, 125, 50, 0.02);
            font-size: 120px;
            animation: arabicFloat 25s linear infinite;
            direction: rtl;
        }
        .arabic-bg-text:nth-child(1) {
            top: 20%;
            left: 5%;
            animation-delay: 0s;
        }
        .arabic-bg-text:nth-child(2) {
            bottom: 30%;
            right: 5%;
            animation-delay: 10s;
            font-size: 80px;
        }
        .arabic-bg-text:nth-child(3) {
            top: 50%;
            left: 40%;
            animation-delay: 20s;
            font-size: 100px;
        }

        @keyframes arabicFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.02;
            }
            25% {
                transform: translate(20px, -20px) rotate(3deg);
                opacity: 0.04;
            }
            50% {
                transform: translate(-10px, 10px) rotate(-2deg);
                opacity: 0.03;
            }
            75% {
                transform: translate(15px, -10px) rotate(4deg);
                opacity: 0.04;
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.02;
            }
        }

        /* ============================================
           ANIMATION UTILITIES
           ============================================ */
        .rotate-star {
            display: inline-block;
            animation: rotateStar 8s linear infinite;
        }
        @keyframes rotateStar {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .shimmer-text {
            background: linear-gradient(90deg, #2E7D32, #FFD700, #2E7D32, #FFD700);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerMove 4s linear infinite;
        }
        @keyframes shimmerMove {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 300% 50%;
            }
        }

        .float-icon {
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(5deg);
            }
        }

        .pulse-btn {
            animation: pulseBtn 2s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(46, 125, 50, 0);
            }
        }

        /* ============================================
           BISMILLAH
           ============================================ */
        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 18px;
            color: var(--primary);
            direction: rtl;
            text-align: center;
            opacity: 0.6;
            margin-bottom: 12px;
        }
        [data-theme="dark"] .bismillah {
            color: #66BB6A;
        }

        /* ============================================
           ERROR CONTAINER
           ============================================ */
        .error-container {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .error-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 48px 36px 40px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .error-card:hover {
            transform: translateY(-4px);
        }
        .error-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            animation: cardGlow 10s ease-in-out infinite;
        }
        @keyframes cardGlow {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        [data-theme="dark"] .error-card {
            border-color: rgba(255, 255, 255, 0.05);
        }

        .error-card .top-decoration {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 12px;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* ============================================
           ERROR CODE
           ============================================ */
        .error-code {
            font-size: 100px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
            position: relative;
            z-index: 1;
            text-shadow: 0 4px 30px rgba(46, 125, 50, 0.08);
        }
        [data-theme="dark"] .error-code {
            color: #66BB6A;
            text-shadow: 0 4px 30px rgba(102, 187, 106, 0.08);
        }

        .error-code .number {
            display: inline-block;
            animation: numberFloat 2.5s ease-in-out infinite;
        }
        .error-code .number:nth-child(1) {
            animation-delay: 0s;
        }
        .error-code .number:nth-child(2) {
            animation-delay: 0.3s;
        }
        .error-code .number:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes numberFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(2deg);
            }
        }

        /* ============================================
           ERROR ICON
           ============================================ */
        .error-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 8px auto 16px;
        }
        .error-icon-wrapper .ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }
        .error-icon-wrapper .ring-1 {
            width: 100%;
            height: 100%;
            border-top-color: var(--gold);
            animation: spin 3s linear infinite;
        }
        .error-icon-wrapper .ring-2 {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-bottom-color: var(--primary);
            animation: spin 4s linear infinite reverse;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-icon-wrapper .icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 44px;
            color: var(--gold);
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -55%) scale(1.05);
            }
        }

        /* ============================================
           ERROR CONTENT
           ============================================ */
        .error-card h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            position: relative;
            z-index: 1;
        }
        .error-card h1 i {
            color: var(--gold);
        }
        .error-card p {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.7;
            max-width: 380px;
            margin: 0 auto 24px;
            position: relative;
            z-index: 1;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .error-actions .btn {
            padding: 12px 28px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            border: none;
            cursor: pointer;
        }
        .error-actions .btn-primary {
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        .error-actions .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.3);
        }
        .error-actions .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .error-actions .btn-outline:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-3px);
        }

        /* ============================================
           DECORATIVE DOTS
           ============================================ */
        .decorative-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        .decorative-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0.3;
            animation: dotPulse 2s ease-in-out infinite;
        }
        .decorative-dots span:nth-child(2) {
            animation-delay: 0.3s;
        }
        .decorative-dots span:nth-child(3) {
            animation-delay: 0.6s;
        }
        .decorative-dots span:nth-child(4) {
            animation-delay: 0.9s;
        }
        .decorative-dots span:nth-child(5) {
            animation-delay: 1.2s;
        }
        @keyframes dotPulse {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.5);
            }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .error-card {
                padding: 32px 24px 28px;
                border-radius: var(--radius-sm);
            }
            .error-card:hover {
                transform: none;
            }

            .error-code {
                font-size: 72px;
            }
            .error-icon-wrapper {
                width: 80px;
                height: 80px;
            }
            .error-icon-wrapper .icon {
                font-size: 34px;
            }
            .error-card h1 {
                font-size: 24px;
            }
            .error-card p {
                font-size: 14px;
            }

            .islamic-ornament,
            .crescent-moon,
            .arabic-bg-text {
                display: none;
            }

            .bismillah {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .error-card {
                padding: 24px 16px 20px;
                border-radius: var(--radius-sm);
            }

            .error-code {
                font-size: 56px;
            }
            .error-icon-wrapper {
                width: 64px;
                height: 64px;
            }
            .error-icon-wrapper .icon {
                font-size: 28px;
            }
            .error-card h1 {
                font-size: 20px;
            }
            .error-card p {
                font-size: 13px;
                margin-bottom: 18px;
            }

            .error-actions {
                flex-direction: column;
                width: 100%;
            }
            .error-actions .btn {
                width: 100%;
                justify-content: center;
                padding: 10px 20px;
                font-size: 13px;
            }

            .error-card .top-decoration {
                font-size: 12px;
                letter-spacing: 8px;
            }

            .decorative-dots {
                gap: 6px;
            }
            .decorative-dots span {
                width: 5px;
                height: 5px;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .error-card {
                padding: 36px 28px 32px;
            }
            .error-code {
                font-size: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js">
    </script>

    <script>
        // ============================================
        // AOS INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                once: true,
                offset: 50,
                duration: 600,
                easing: 'ease-out-cubic'
            });
        });

        // ============================================
        // THEME TOGGLE (Konsisten dengan halaman lain)
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            var currentTheme = localStorage.getItem('theme') || 'light';

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }

            setTheme(currentTheme);
        });

        console.log('🌙 Filantropi Digital - 404 Page Loaded Successfully!');
        console.log('🤲 "Barangsiapa memberi, maka ia akan mendapatkan balasan"');
    </script>
