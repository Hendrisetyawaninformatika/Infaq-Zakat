<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Login - Filantropi Digital</title>
    <meta name="description" content="Login ke Filantropi Digital" />
    <link rel="icon" href="assets/icon.ico" type="image/x-icon" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2E7D32;
            --primary-dark: #1a472a;
            --primary-light: #4CAF50;
            --gold: #FFD700;
            --gold-light: #FFE44D;
            --bg: #f8f6f0;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #666666;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --text-light: #aaaaaa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 420px; width: 100%; }

        .login-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 36px 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .login-card .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-card .logo .icon {
            font-size: 48px;
            color: var(--gold);
            display: block;
            margin-bottom: 4px;
        }
        .login-card .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }
        .login-card .logo h1 span { color: var(--gold); }
        .login-card .logo p {
            color: var(--text-light);
            font-size: 13px;
        }

        .login-card .form-group {
            margin-bottom: 16px;
        }
        .login-card .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .login-card .form-group label i {
            color: var(--primary);
            margin-right: 4px;
        }
        .login-card .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            outline: none;
        }
        .login-card .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.08);
        }
        [data-theme="dark"] .login-card .form-group input {
            border-color: rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-login-submit {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.3);
        }
        .btn-login-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.06);
        }
        .divider span {
            color: var(--text-light);
            font-size: 12px;
            font-weight: 500;
        }

        .btn-google {
            width: 100%;
            padding: 11px;
            border-radius: var(--radius-sm);
            background: #fff;
            color: #333;
            border: 2px solid rgba(0, 0, 0, 0.06);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .btn-google i {
            font-size: 18px;
            color: #DB4437;
        }
        .btn-google:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        [data-theme="dark"] .btn-google {
            background: #2d2d2d;
            color: #eee;
            border-color: rgba(255, 255, 255, 0.06);
        }

        .login-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--text-light);
        }
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 16px;
            color: var(--primary);
            direction: rtl;
            text-align: center;
            opacity: 0.6;
            margin-bottom: 12px;
        }
        [data-theme="dark"] .bismillah { color: #66BB6A; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 18px;
            background: var(--card);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            max-width: 380px;
            border-left: 4px solid var(--primary);
            font-size: 13px;
            color: var(--text);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #F44336; }
        .toast i { font-size: 16px; }
        .toast.error i { color: #F44336; }
        .toast.success i { color: #4CAF50; }

        @media (max-width: 480px) {
            .login-card { padding: 24px 18px; }
            .login-card .logo h1 { font-size: 19px; }
            .login-card .form-group input { font-size: 13px; padding: 8px 12px; }
            .btn-login-submit { font-size: 14px; padding: 10px; }
            .btn-google { font-size: 13px; padding: 10px; }
            .bismillah { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card" data-aos="fade-up">
            <div class="logo">
                <span class="icon">🤲</span>
                <h1>Filantropi<span>Digital</span></h1>
                <p>Masuk ke akun Anda</p>
            </div>

            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

            <!-- 🔥 GOOGLE LOGIN - POPUP LANGSUNG -->
            <button id="googleLoginBtn" class="btn-google">
                <i class="fab fa-google"></i> Login dengan Google
            </button>

            <div class="divider">
                <span>atau</span>
            </div>

            <!-- 🔥 FORM DENGAN AUTOCOMPLETE OFF -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" autocomplete="new-password" />
                </div>
                <button type="submit" class="btn-login-submit">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>

            <div class="login-footer">
                Belum punya akun? <a href="register.html">Daftar Sekarang</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-exclamation-circle"></i>
        <span id="toastMessage">Pesan</span>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyD65Br_UKSoQBvmXOzokQpSaLRzCUiFbXU",
            authDomain: "web-infaqzakat.firebaseapp.com",
            databaseURL: "https://web-infaqzakat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "web-infaqzakat",
            storageBucket: "web-infaqzakat.firebasestorage.app",
            messagingSenderId: "1088791063373",
            appId: "1:1088791063373:web:91e322e0450aaa03ae2504",
            measurementId: "G-Q15306PRL9"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // AOS INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ once: true, offset: 50, duration: 600, easing: 'ease-out-cubic' });
        });

        // ============================================
        // THEME TOGGLE
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const currentTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
        });

        // ============================================
        // TOAST FUNCTION
        // ============================================
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toast.className = 'toast ' + (type || '');
            icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toastMessage.textContent = message;
            toast.classList.add('show');

            setTimeout(function() {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================
        // 🔥 HAPUS EMAIL & PASSWORD OTOMATIS
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Hapus value input saat halaman dimuat
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            
            // Focus ke email
            document.getElementById('email').focus();
        });

        // ============================================
        // 🔥 GOOGLE LOGIN - POPUP (PASTI BERFUNGSI)
        // ============================================
        document.getElementById('googleLoginBtn').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('email');
            provider.addScope('profile');

            // 🔥 Gunakan signInWithPopup (lebih stabil)
            auth.signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    console.log('✅ Login Google berhasil:', user.displayName || user.email);
                    handleUserLogin(user);
                })
                .catch(function(error) {
                    console.error('❌ Login Google gagal:', error);
                    let message = 'Login gagal. Silakan coba lagi.';
                    if (error.code === 'auth/popup-blocked') {
                        message = '⚠️ Popup diblokir. Izinkan popup untuk login.';
                    } else if (error.code === 'auth/popup-closed-by-user') {
                        message = '⚠️ Popup ditutup sebelum login selesai.';
                    } else if (error.code === 'auth/network-request-failed') {
                        message = '⚠️ Koneksi internet bermasalah. Coba lagi.';
                    } else if (error.code === 'auth/operation-not-supported-in-this-environment') {
                        message = '⚠️ Gunakan Live Server! Buka dengan http:// bukan file://';
                    }
                    showToast(message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fab fa-google"></i> Login dengan Google';
                });
        });

        // ============================================
        // 🔥 HANDLE USER LOGIN
        // ============================================
        function handleUserLogin(user) {
            console.log('✅ User login:', user.displayName || user.email);

            const userData = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email,
                photoURL: user.photoURL
            };

            sessionStorage.setItem('userData', JSON.stringify(userData));

            // Simpan ke Firestore
            db.collection('users').doc(user.uid).set({
                name: user.displayName || user.email,
                email: user.email,
                role: 'user',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(function() {
                console.log('✅ User data saved to Firestore');
            }).catch(function(err) {
                console.log('⚠️ Gagal simpan ke Firestore:', err);
            });

            showToast('✅ Selamat datang, ' + (user.displayName || user.email) + '!', 'success');
            
            // 🔥 REDIRECT KE DASHBOARD
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 800);
        }

        // ============================================
        // EMAIL/PASSWORD LOGIN
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showToast('❌ Email dan password harus diisi!', 'error');
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            auth.signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    console.log('✅ Login email berhasil:', user.email);
                    handleUserLogin(user);
                })
                .catch(function(error) {
                    console.error('❌ Login gagal:', error);
                    let message = 'Login gagal. Coba lagi.';
                    if (error.code === 'auth/user-not-found') {
                        message = '❌ Email tidak terdaftar.';
                    } else if (error.code === 'auth/wrong-password') {
                        message = '❌ Password salah.';
                    } else if (error.code === 'auth/invalid-email') {
                        message = '❌ Format email tidak valid.';
                    } else if (error.code === 'auth/too-many-requests') {
                        message = '⚠️ Terlalu banyak percobaan. Coba nanti.';
                    }
                    showToast(message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
                });
        });

        // ============================================
        // CEK STATUS LOGIN
        // ============================================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // Jika sudah login, redirect ke dashboard
                window.location.href = 'dashboard.html';
            }
        });

        console.log('🌙 Filantropi Digital - Login Page Loaded');
        console.log('📱 Nomor Admin: 081248141031');
        console.log('🔍 Protocol:', window.location.protocol);
    </script>

</body>
</html>
