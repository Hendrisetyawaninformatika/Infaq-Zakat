<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Login - Filantropi Digital</title>
    <link rel="icon" href="assets/icon.ico" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" />

    <style>
        /* CSS sama seperti register (dengan card lebih kecil) – disalin dari register dengan modifikasi */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2E7D32;
            --primary-dark: #1a472a;
            --gold: #FFD700;
            --bg: #f8f6f0;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #666666;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --text-light: #aaaaaa;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        html, body { height: 100%; margin:0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
            opacity: 1 !important;
            visibility: visible !important;
        }
        /* Loader sama seperti register */
        #loader {
            position: fixed; inset: 0; background: var(--card);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: none;
        }
        #loader.hidden { display: none; }
        .loader-container { text-align: center; color: var(--text); }
        .loader-ring-main {
            position: relative; width: 80px; height: 80px; margin: 0 auto 20px;
        }
        .loader-ring {
            position: absolute; border-radius: 50%; border: 3px solid transparent;
        }
        .loader-ring.ring-1 {
            width: 100%; height: 100%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        .loader-ring.ring-2 {
            width: 70%; height: 70%; top:15%; left:15%;
            border-bottom-color: var(--gold);
            animation: spin 1.5s linear infinite reverse;
        }
        .loader-ring.ring-3 {
            width: 40%; height: 40%; top:30%; left:30%;
            border-left-color: #4CAF50;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-moon { font-size: 30px; color: var(--gold); margin-bottom:10px; }
        .loader-container h2 { font-size:22px; font-weight:700; }
        .loader-container h2 span { color: var(--gold); }
        .loader-progress {
            width: 200px; height: 4px;
            background: rgba(0,0,0,0.06); border-radius:10px;
            margin: 12px auto; overflow:hidden;
        }
        .loader-progress-bar {
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--gold));
            border-radius:10px; transition:width 0.2s linear; width:0%;
        }
        .loader-text { font-size:14px; color: var(--text-light); }
        .loader-dua {
            font-family: 'Amiri', serif; font-size:18px;
            color: var(--primary); margin-top:6px; direction:rtl;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 0 0 20px 0;
            margin: 10px auto;
        }
        .auth-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 30px 24px 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
            width: 100%;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-dark);
            text-decoration: none;
        }
        .auth-logo i { color: var(--gold); font-size: 24px; }
        .auth-logo span { color: var(--gold); }
        .auth-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin: 6px 0 2px;
        }
        .auth-header p {
            color: var(--text-light);
            font-size: 14px;
        }
        .auth-form .form-group {
            margin-bottom: 14px;
        }
        .auth-form .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .auth-form .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid rgba(0,0,0,0.06);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        [data-theme="dark"] .auth-form .form-group input {
            border-color: rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
        }
        .auth-form .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(46,125,50,0.08);
        }
        .btn-primary-custom {
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 4px;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46,125,50,0.3);
        }
        .btn-primary-custom:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-google-custom {
            background: var(--card) !important;
            color: var(--text) !important;
            border: 2px solid rgba(0,0,0,0.06) !important;
            padding: 10px !important;
            font-size: 14px !important;
            border-radius: var(--radius-sm) !important;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }
        .btn-google-custom:hover {
            border-color: var(--primary) !important;
            transform: translateY(-2px);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            gap: 12px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.06);
        }
        .divider span {
            color: var(--text-light);
            font-size: 12px;
            font-weight: 500;
        }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(0,0,0,0.04);
        }
        .auth-footer p {
            color: var(--text-light);
            font-size: 13px;
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .error-message {
            color: #F44336;
            font-size: 13px;
            min-height: 20px;
            margin-top: 6px;
            text-align: center;
        }
        .toast { /* sama seperti register */ }
        .spinner { /* sama */ }

        /* Responsive login */
        @media (max-width: 480px) {
            .auth-card {
                padding: 20px 14px 22px;
                border-radius: var(--radius-sm);
            }
            .auth-header h2 {
                font-size: 20px;
            }
            .auth-logo {
                font-size: 17px;
            }
            .auth-logo i {
                font-size: 20px;
            }
            .auth-form .form-group input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .btn-primary-custom {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-container">
            <div class="loader-ring-main">
                <div class="loader-ring ring-1"></div>
                <div class="loader-ring ring-2"></div>
                <div class="loader-ring ring-3"></div>
            </div>
            <div class="loader-moon"><i class="fas fa-star-and-crescent"></i></div>
            <h2>Filantropi <span>Digital</span></h2>
            <div class="loader-progress">
                <div class="loader-progress-bar" id="loaderProgress"></div>
            </div>
            <p class="loader-text">✨ Membuka Pintu Kebaikan ✨</p>
            <p class="loader-dua">اللهم بارك</p>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Pesan</span>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-hand-holding-heart"></i>
                    <span>Filantropi<span>Digital</span></span>
                </a>
                <h2>🔐 Masuk</h2>
                <p>Silakan login untuk melanjutkan</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="email@domain.com" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Kata Sandi</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="btn-primary-custom" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
                <div class="divider"><span>atau</span></div>
                <button type="button" id="googleLoginBtn" class="btn-google-custom">
                    <i class="fab fa-google"></i> Masuk dengan Google
                </button>
            </form>

            <div class="auth-footer">
                <p>Belum punya akun? <a href="register.html">Daftar Sekarang</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD65Br_UKSoQBvmXOzokQpSaLRzCUiFbXU",
            authDomain: "web-infaqzakat.firebaseapp.com",
            databaseURL: "https://web-infaqzakat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "web-infaqzakat",
            storageBucket: "web-infaqzakat.firebasestorage.app",
            messagingSenderId: "1088791063373",
            appId: "1:1088791063373:web:91e322e0450aaa03ae2504",
            measurementId: "G-Q15306PRL9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Loader
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('loader');
            const progressBar = document.getElementById('loaderProgress');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10 + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    loader.classList.add('hidden');
                }
                if (progressBar) progressBar.style.width = Math.min(progress, 100) + '%';
            }, 100);

            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);

            // Jika sudah login, redirect ke dashboard
            auth.onAuthStateChanged(function(user) {
                if (user) {
                    window.location.replace('dashboard.html');
                }
            });
        });

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            toast.className = 'toast toast-' + type;
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // Login form
        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            if (!email || !password) {
                loginError.textContent = '⚠️ Email dan password wajib diisi.';
                return;
            }

            loginError.textContent = '';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Memproses...';

            auth.signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    localStorage.setItem('userData', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || 'User'
                    }));
                    showToast('✅ Login berhasil!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                })
                .catch(function(error) {
                    let msg = error.message;
                    if (error.code === 'auth/user-not-found') msg = 'Email tidak terdaftar.';
                    else if (error.code === 'auth/wrong-password') msg = 'Password salah.';
                    else if (error.code === 'auth/invalid-email') msg = 'Format email tidak valid.';
                    loginError.textContent = '❌ ' + msg;
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
                });
        });

        // Google Login
        document.getElementById('googleLoginBtn').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';

            auth.signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    localStorage.setItem('userData', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || 'User'
                    }));
                    showToast('✅ Login dengan Google berhasil!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                })
                .catch(function(error) {
                    showToast('❌ ' + error.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fab fa-google"></i> Masuk dengan Google';
                });
        });
    </script>
</body>
</html>
