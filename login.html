<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Login - Filantropi Digital</title>
    <meta name="description" content="Masuk ke dashboard Filantropi Digital." />
    <link rel="icon" href="assets/icon.ico" type="image/x-icon" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" />

    <style>
        /* ─── RESET & BASE ─── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2E7D32;
            --primary-dark: #1a472a;
            --primary-light: #4CAF50;
            --gold: #FFD700;
            --gold-light: #FFE44D;
            --bg: #f8f6f0;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #666666;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --text-light: #aaaaaa;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* ─── LOADER (hilang instan) ─── */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: none;
        }
        #loader.hidden { display: none; }

        .loader-container {
            text-align: center;
            color: var(--text);
        }
        .loader-ring-main {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }
        .loader-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }
        .loader-ring.ring-1 {
            width: 100%; height: 100%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        .loader-ring.ring-2 {
            width: 70%; height: 70%;
            top: 15%; left: 15%;
            border-bottom-color: var(--gold);
            animation: spin 1.5s linear infinite reverse;
        }
        .loader-ring.ring-3 {
            width: 40%; height: 40%;
            top: 30%; left: 30%;
            border-left-color: var(--primary-light);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-moon { font-size: 30px; color: var(--gold); margin-bottom: 10px; }
        .loader-container h2 { font-size: 22px; font-weight: 700; }
        .loader-container h2 span { color: var(--gold); }
        .loader-progress {
            width: 200px; height: 4px;
            background: rgba(0,0,0,0.06);
            border-radius: 10px;
            margin: 12px auto;
            overflow: hidden;
        }
        .loader-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--gold));
            border-radius: 10px;
            transition: width 0.2s linear;
            width: 0%;
        }
        .loader-text { font-size: 14px; color: var(--text-light); }
        .loader-dua {
            font-family: 'Amiri', serif;
            font-size: 18px;
            color: var(--primary);
            margin-top: 6px;
            direction: rtl;
        }

        /* ─── LOGIN CARD ─── */
        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            padding: 0 10px;
        }

        .auth-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
            width: 100%;
            transition: var(--transition);
        }
        .auth-card:hover { transform: translateY(-4px); }
        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 70%);
            border-radius: 50%;
            animation: cardGlow 10s ease-in-out infinite;
        }
        @keyframes cardGlow { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.2); } }
        [data-theme="dark"] .auth-card { border-color: rgba(255,255,255,0.05); }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-dark);
            text-decoration: none;
        }
        .auth-logo i { color: var(--gold); font-size: 28px; }
        .auth-logo span { color: var(--gold); }
        [data-theme="dark"] .auth-logo { color: #66BB6A; }

        .auth-header-decoration {
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 8px;
            margin: 6px 0 12px;
        }
        .auth-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }
        .auth-header p {
            color: var(--text-light);
            font-size: 14px;
        }

        /* ─── FORM ─── */
        .auth-form .form-group {
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        .auth-form .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
            color: var(--text);
        }
        .auth-form .form-group label i { color: var(--primary); }
        .auth-form .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid rgba(0,0,0,0.06);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        [data-theme="dark"] .auth-form .form-group input {
            border-color: rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
        }
        .auth-form .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 4px rgba(46,125,50,0.08);
        }
        .auth-form .form-group input.error {
            border-color: #F44336;
            box-shadow: 0 0 0 4px rgba(244,67,54,0.08);
        }

        .btn-primary-custom {
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 4px;
        }
        .btn-primary-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(46,125,50,0.3);
        }
        .btn-primary-custom:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-google-custom {
            background: var(--card) !important;
            color: var(--text) !important;
            border: 2px solid rgba(0,0,0,0.06) !important;
            padding: 12px !important;
            font-size: 14px !important;
            border-radius: var(--radius-sm) !important;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .btn-google-custom:hover {
            border-color: var(--primary) !important;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 16px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.06);
        }
        [data-theme="dark"] .divider::before,
        [data-theme="dark"] .divider::after {
            background: rgba(255,255,255,0.06);
        }
        .divider span {
            color: var(--text-light);
            font-size: 12px;
            font-weight: 500;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0,0,0,0.04);
            position: relative;
            z-index: 1;
        }
        [data-theme="dark"] .auth-footer {
            border-top-color: rgba(255,255,255,0.04);
        }
        .auth-footer p {
            color: var(--text-light);
            font-size: 13px;
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }
        .auth-footer a:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }

        .error-message {
            color: #F44336;
            font-size: 13px;
            min-height: 24px;
            margin-top: 8px;
            text-align: center;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            background: var(--card);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            max-width: 90%;
            border-left: 4px solid var(--primary);
            font-size: 14px;
            color: var(--text);
        }
        .toast.show { transform: translateX(0); }
        .toast-success { border-left-color: #4CAF50; }
        .toast-error { border-left-color: #F44336; }
        .toast i { font-size: 18px; }
        .toast-success i { color: #4CAF50; }
        .toast-error i { color: #F44336; }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ─── ANTI-FLICKER ─── */
        body, .auth-card, .auth-card * {
            animation: none !important;
            transition: none !important;
        }
        .auth-card:hover { transform: none !important; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .auth-card { padding: 24px 16px; border-radius: var(--radius-sm); }
            .auth-header h2 { font-size: 22px; }
            .auth-logo { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-container">
            <div class="loader-ring-main">
                <div class="loader-ring ring-1"></div>
                <div class="loader-ring ring-2"></div>
                <div class="loader-ring ring-3"></div>
            </div>
            <div class="loader-moon"><i class="fas fa-star-and-crescent"></i></div>
            <h2>Filantropi <span>Digital</span></h2>
            <div class="loader-progress">
                <div class="loader-progress-bar" id="loaderProgress"></div>
            </div>
            <p class="loader-text">✨ Membuka Pintu Kebaikan ✨</p>
            <p class="loader-dua">اللهم بارك</p>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Pesan</span>
    </div>

    <!-- LOGIN CARD -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-hand-holding-heart"></i>
                    <span>Filantropi<span>Digital</span></span>
                </a>
                <div class="auth-header-decoration">✦ ✦ ✦</div>
                <h2>🔐 Masuk ke Akun</h2>
                <p>Silakan login untuk melanjutkan</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="masukkan@email.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Kata Sandi</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="btn-primary-custom" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>

                <div class="divider"><span>atau</span></div>

                <button type="button" id="googleLoginBtn" class="btn-google-custom">
                    <i class="fab fa-google"></i> Masuk dengan Google
                </button>
            </form>

            <div class="auth-footer">
                <p>Belum punya akun? <a href="register.html">Daftar Sekarang</a></p>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS FIREBASE (CDN compat) ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

    <script>
        // ============================================
        // FIREBASE CONFIG (dari Anda)
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyD65Br_UKSoQBvmXOzokQpSaLRzCUiFbXU",
            authDomain: "web-infaqzakat.firebaseapp.com",
            databaseURL: "https://web-infaqzakat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "web-infaqzakat",
            storageBucket: "web-infaqzakat.firebasestorage.app",
            messagingSenderId: "1088791063373",
            appId: "1:1088791063373:web:91e322e0450aaa03ae2504",
            measurementId: "G-Q15306PRL9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // LOADER – hilang instan setelah 1 detik
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('loader');
            const progressBar = document.getElementById('loaderProgress');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10 + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    loader.classList.add('hidden');
                }
                if (progressBar) progressBar.style.width = Math.min(progress, 100) + '%';
            }, 100);

            // Theme
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);

            // Jika sudah login, langsung ke dashboard
            auth.onAuthStateChanged(function(user) {
                if (user) {
                    window.location.replace('dashboard.html');
                }
            });
        });

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            toast.className = 'toast toast-' + type;
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ============================================
        // LOGIN FORM
        // ============================================
        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            if (!email || !password) {
                loginError.textContent = '⚠️ Email dan password wajib diisi.';
                return;
            }

            loginError.textContent = '';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Memproses...';

            auth.signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    // Simpan data user di localStorage (opsional)
                    localStorage.setItem('userData', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || 'User'
                    }));
                    showToast('✅ Login berhasil!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                })
                .catch(function(error) {
                    let msg = error.message;
                    if (error.code === 'auth/user-not-found') msg = 'Email tidak terdaftar.';
                    else if (error.code === 'auth/wrong-password') msg = 'Password salah.';
                    else if (error.code === 'auth/invalid-email') msg = 'Format email tidak valid.';
                    loginError.textContent = '❌ ' + msg;
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
                });
        });

        // ============================================
        // GOOGLE LOGIN
        // ============================================
        document.getElementById('googleLoginBtn').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';

            auth.signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    localStorage.setItem('userData', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || 'User'
                    }));
                    showToast('✅ Login dengan Google berhasil!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                })
                .catch(function(error) {
                    showToast('❌ ' + error.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fab fa-google"></i> Masuk dengan Google';
                });
        });

        console.log('✅ Login page loaded – Firebase integrated');
    </script>

</body>
</html>
