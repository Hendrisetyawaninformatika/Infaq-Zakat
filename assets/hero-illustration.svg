<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#grad1)" rx="20"/>
  
  <!-- Hand holding heart icon -->
  <g transform="translate(250, 180)">
    <circle cx="0" cy="0" r="80" fill="#2E7D32" opacity="0.1"/>
    <circle cx="0" cy="0" r="60" fill="#2E7D32" opacity="0.15"/>
    <text x="0" y="10" font-family="Arial" font-size="60" text-anchor="middle">🤲</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="20" fill="#FFD700" opacity="0.2"/>
  <circle cx="400" cy="300" r="15" fill="#2E7D32" opacity="0.15"/>
  <circle cx="80" cy="320" r="10" fill="#FFD700" opacity="0.15"/>
  <circle cx="420" cy="100" r="25" fill="#2E7D32" opacity="0.1"/>
  
  <!-- Stars -->
  <text x="50" y="50" font-size="20" opacity="0.3">✦</text>
  <text x="450" y="50" font-size="16" opacity="0.3">✦</text>
  <text x="30" y="200" font-size="14" opacity="0.2">✦</text>
  <text x="470" y="200" font-size="18" opacity="0.2">✦</text>
  
  <!-- Text -->
  <text x="250" y="340" font-family="Arial, sans-serif" font-size="16" fill="#2E7D32" text-anchor="middle" font-weight="bold">Platform Filantropi Digital</text>
  <text x="250" y="365" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Zakat • Infak • Sedekah • Qurban</text>
</svg>